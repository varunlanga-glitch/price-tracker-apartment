name: Daily Condo Scrape

on:
  schedule:
    - cron: '0 14 * * *'   # 6 AM Vancouver (UTC-8) / 7 AM during PDT (UTC-7)
  workflow_dispatch:        # lets you trigger manually too

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python run.py

      - name: Commit updated database and report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add condo_tracker.db reports/
          git diff --cached --quiet || git commit -m "Daily scrape $(date -u +%Y-%m-%d)"
          git push
